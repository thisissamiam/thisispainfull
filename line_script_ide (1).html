<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title><<<>><><<<>>> IDE</title>
<style>
body{
margin:0;
background:#0f0f0f;
color:#e0e0e0;
font-family:monospace;
overflow:hidden;
}
#topbar{
height:40px;
background:#111;
display:flex;
align-items:center;
padding:0 10px;
gap:10px;
}
button{
background:#222;
color:#eee;
border:none;
padding:6px 10px;
cursor:pointer;
}
button:hover{background:#333;}
#layout{
display:flex;
height:calc(100vh - 40px);
}
#editor{
width:50%;
height:100%;
background:#0a0a0a;
color:#00ffcc;
border:none;
outline:none;
padding:10px;
resize:none;
font-size:14px;
}
#output{
width:50%;
height:100%;
border:none;
background:#ffffff;
}
#status{
position:absolute;
bottom:5px;
left:10px;
font-size:10px;
opacity:0.5;
}
</style>
</head>
<body>
<div id="topbar">
<button onclick="runCode()">><>< Run</button>
<button onclick="clearAll()"><< Clear</button>
<button onclick="beauty()">><>< Format</button>
</div>
<div id="layout">
<textarea id="editor" spellcheck="false">>>>. >>>.. >>>...</textarea>
<iframe id="output"></iframe>
</div>
<div id="status"><<<>>< status: ready ></div>
<script>
function runCode(){
  const code = document.getElementById('editor').value.trim();
  const tokens = code.split(/\s+/);

  let output = "";

  tokens.forEach(token => {
    let count = (token.match(/>/g) || []).length;
    let dots = (token.match(/\./g) || []).length;

    if (dots === 1){ // lowercase letter
      if (count === 0) { output += " "; return; }
      let charCode = ((count - 1) % 26) + 97;
      output += String.fromCharCode(charCode);
    }
    else if (dots === 2){ // uppercase
      if (count === 0) { output += " "; return; }
      let charCode = ((count - 1) % 26) + 65;
      output += String.fromCharCode(charCode);
    }
    else if (dots === 3){ // number
      let digit = count % 10;
      output += digit.toString();
    }
  });

  document.getElementById('output').srcdoc = "<pre>" + output + "</pre>";
  document.getElementById('status').innerText = '<<<> executed >>';
}

function clearAll(){
  document.getElementById('editor').value = '';
  document.getElementById('output').srcdoc = '';
  document.getElementById('status').innerText = '<< cleared >>';
}

function beauty(){
  let t = document.getElementById('editor');
  let lines = t.value.split('\n');
  let spaced = lines.map(l => l.trim()).join('\n');
  t.value = spaced;
  document.getElementById('status').innerText = '<< formatted >>';
}
</script>
</body>
</html>
