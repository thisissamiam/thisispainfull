<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title><<<>><><<<>>> IDE</title>
<style>
body{
margin:0;
background:#0f0f0f;
color:#e0e0e0;
font-family:monospace;
overflow:hidden;
}
#topbar{
height:40px;
background:#111;
display:flex;
align-items:center;
padding:0 10px;
gap:10px;
}
button{
background:#222;
color:#eee;
border:none;
padding:6px 10px;
cursor:pointer;
}
button:hover{background:#333;}
#layout{
display:flex;
height:calc(100vh - 40px);
}
#editor{
width:50%;
height:100%;
background:#0a0a0a;
color:#00ffcc;
border:none;
outline:none;
padding:10px;
resize:none;
font-size:14px;
}
#output{
width:50%;
height:100%;
border:none;
background:#ffffff;
}
#status{
position:absolute;
bottom:5px;
left:10px;
font-size:10px;
opacity:0.5;
}
</style>
</head>
<body>
<div id="topbar">
<button onclick="runCode()">><>< Run</button>
<button onclick="clearAll()"><< Clear</button>
</div>
<div id="layout">
<textarea id="editor" spellcheck="false">
>>>>[ >>>. ]
</textarea>
<iframe id="output"></iframe>
</div>
<div id="status"><<<>>< status: ready ></div>
<script>
function decodeToken(token){
  let count = (token.match(/>/g) || []).length;
  let dots = (token.match(/\./g) || []).length;

  if(dots === 1){
    return String.fromCharCode(((count - 1) % 26) + 97);
  }
  if(dots === 2){
    return String.fromCharCode(((count - 1) % 26) + 65);
  }
  if(dots === 3){
    return (count % 10).toString();
  }
  return "";
}

function runCode(){
  const code = document.getElementById('editor').value.trim();
  const tokens = code.split(/\s+/);

  let output = "";

  function execute(start, end){
    for(let i = start; i < end; i++){
      let token = tokens[i];

      // Loop start >>>>[ 
      let loopMatch = token.match(/^(>+)\[$/);
      if(loopMatch){
        let count = loopMatch[1].length;

        // find matching ]
        let depth = 1;
        let j = i + 1;
        while(j < end && depth > 0){
          if(tokens[j] && tokens[j].endsWith('[')) depth++;
          if(tokens[j] === ']') depth--;
          j++;
        }

        let loopStart = i + 1;
        let loopEnd = j - 1;

        for(let r = 0; r < count; r++){
          execute(loopStart, loopEnd);
        }

        i = loopEnd;
        continue;
      }

      // ignore loop closing token
      if(token === ']') continue;

      // output tokens
      if(/^[>.]+$/.test(token)){
        output += decodeToken(token);
      }
    }
  }

  execute(0, tokens.length);

  document.getElementById('output').srcdoc = "<pre>" + output + "</pre>";
  document.getElementById('status').innerText = '<<<> executed >>';
}

function clearAll(){
  document.getElementById('editor').value = '';
  document.getElementById('output').srcdoc = '';
  document.getElementById('status').innerText = '<< cleared >>';
}
