<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LineScript IDE</title>
  <style>
    body {
      margin: 0;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #1e1e1e;
      color: #fff;
    }

    header {
      background: #111;
      padding: 10px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
      border: none;
      background: #333;
      color: white;
      border-radius: 4px;
    }

    .container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .editor-wrapper {
      display: flex;
      width: 50%;
      border-right: 1px solid #333;
    }

    .line-numbers {
      background: #2a2a2a;
      padding: 10px 5px;
      text-align: right;
      color: #888;
      user-select: none;
    }

    textarea {
      width: 100%;
      height: 100%;
      padding: 10px;
      border: none;
      outline: none;
      resize: none;
      background: #1e1e1e;
      color: #fff;
      font-size: 14px;
      line-height: 1.5;
      overflow: auto;
    }

    .output {
      width: 50%;
      padding: 10px;
      overflow-y: auto;
      white-space: pre-wrap;
      background: #000;
      color: #0f0;
    }
  </style>
</head>
<body>
  <header>
    <button onclick="runCode()">Run</button>
    <button onclick="clearOutput()">Clear Output</button>
  </header>

  <div class="container">
    <div class="editor-wrapper">
      <div id="lineNumbers" class="line-numbers"></div>
      <textarea id="code" oninput="updateLineNumbers()" onscroll="syncScroll()" placeholder="Write your LineScript code here..."></textarea>
    </div>
    <div class="output" id="output"></div>
  </div>

  <script>
    const lines = [];
    const vars = {};

    const codeArea = document.getElementById("code");
    const lineNumbers = document.getElementById("lineNumbers");

    function updateLineNumbers() {
      const count = codeArea.value.split("\n").length;
      let nums = "";
      for (let i = 1; i <= count; i++) {
        nums += i + "\n";
      }
      lineNumbers.textContent = nums;
    }

    function syncScroll() {
      lineNumbers.scrollTop = codeArea.scrollTop;
    }

    function log(msg) {
      const output = document.getElementById("output");
      output.textContent += msg + "\n";
    }

    function runLine(line) {
      const parts = line.trim().split(" ");
      if (!parts[0]) return;
      const cmd = parts[0];

      try {
        if (cmd === "addline") {
          lines.push(parts.slice(1).join(" "));
        } else if (cmd === "editline") {
          const i = parseInt(parts[1]);
          lines[i] = parts.slice(2).join(" ");
        } else if (cmd === "delline") {
          const i = parseInt(parts[1]);
          lines.splice(i, 1);
        } else if (cmd === "clearlines") {
          lines.length = 0;
        } else if (cmd === "set") {
          vars[parts[1]] = parseFloat(parts[2]);
        } else if (cmd === "add") {
          vars[parts[1]] += parseFloat(parts[2]);
        } else if (cmd === "sub") {
          vars[parts[1]] -= parseFloat(parts[2]);
        } else if (cmd === "multi") {
          vars[parts[1]] *= parseFloat(parts[2]);
        } else if (cmd === "div") {
          vars[parts[1]] /= parseFloat(parts[2]);
        } else if (cmd === "print") {
          log(vars[parts[1]]);
        }
      } catch (e) {
        log("Error: " + line);
      }
    }

    function runCode() {
      document.getElementById("output").textContent = "";
      lines.length = 0;

      const program = codeArea.value.split("\n");

      program.forEach(line => runLine(line));

      log("\n--- FINAL STATE ---");
      log("Lines:");
      lines.forEach((l, i) => log(i + ": " + l));

      log("\nVariables:");
      for (let v in vars) {
        log(v + " = " + vars[v]);
      }
    }

    function clearOutput() {
      document.getElementById("output").textContent = "";
    }

    updateLineNumbers();
  </script>
</body>
</html>
