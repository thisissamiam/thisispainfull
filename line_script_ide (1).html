<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Compiler (Local)</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #111;
    color: #eee;
    padding: 20px;
  }

  textarea {
    width: 100%;
    height: 150px;
    background: #222;
    color: #0f0;
    border: 1px solid #444;
    padding: 10px;
    font-family: monospace;
  }

  button {
    padding: 10px 20px;
    margin-top: 10px;
    cursor: pointer;
  }

  #output {
    margin-top: 20px;
    background: #000;
    padding: 10px;
    height: 200px;
    overflow-y: auto;
    font-family: monospace;
    border: 1px solid #444;
    white-space: pre-wrap;
  }
</style>
</head>
<body>

<h2>AI Local Compiler (Custom → JavaScript)</h2>

<textarea id="codeInput" placeholder="Enter your custom code here..."></textarea>
<br>
<button onclick="runCode()">Run</button>

<div id="output"></div>

<script type="module">
import { pipeline } from "https://cdn.jsdelivr.net/npm/@xenova/transformers";

const outputDiv = document.getElementById("output");
const inputBox = document.getElementById("codeInput");

let translator;

// Load AI model
async function loadModel() {
  log("Loading AI model... (first time may take a while)\n");

  translator = await pipeline(
    "text-generation",
    "Xenova/distilgpt2"
  );

  log("Model loaded!\n");
}

function log(text) {
  outputDiv.textContent += text + "\n";
}

// Translate custom code → JS
async function translate(code) {
  const prompt = `
Convert the following custom language into JavaScript.

Rules:
- Output ONLY JavaScript
- No explanations
- Use console.log for output

Code:
${code}
`;

  const result = await translator(prompt, {
    max_new_tokens: 150
  });

  return result[0].generated_text;
}

// Run compiler
window.runCode = async function () {
  outputDiv.textContent = "";

  const code = inputBox.value;

  if (!translator) {
    log("AI not loaded yet...");
    return;
  }

  log("Translating...\n");

  const jsCode = await translate(code);

  log("Generated JS:\n");
  log(jsCode);
  log("\nRunning...\n");

  try {
    const originalLog = console.log;

    console.log = (...args) => {
      log(args.join(" "));
    };

    eval(jsCode);

    console.log = originalLog;
  } catch (err) {
    log("Error: " + err);
  }
};

// Start loading immediately
loadModel();
</script>

</body>
</html>
