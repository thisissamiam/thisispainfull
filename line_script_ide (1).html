<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Compiler</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #111;
    color: #eee;
    padding: 20px;
  }

  textarea {
    width: 100%;
    height: 150px;
    background: #222;
    color: #0f0;
    border: 1px solid #444;
    padding: 10px;
    font-family: monospace;
  }

  button {
    padding: 10px 20px;
    margin-top: 10px;
    cursor: pointer;
  }

  #output {
    margin-top: 20px;
    background: #000;
    padding: 10px;
    height: 200px;
    overflow-y: auto;
    font-family: monospace;
    border: 1px solid #444;
    white-space: pre-wrap;
  }

  #status {
    margin-top: 10px;
    font-size: 14px;
    color: #aaa;
  }
</style>
</head>
<body>

<h2>Compiler</h2>

<textarea id="codeInput" placeholder="Enter code..."></textarea>
<br>
<button onclick="runCode()">Run</button>

<div id="status">Initializing...</div>
<div id="output"></div>

<script type="module">
import { pipeline } from "https://cdn.jsdelivr.net/npm/@xenova/transformers";

const outputDiv = document.getElementById("output");
const statusDiv = document.getElementById("status");
const inputBox = document.getElementById("codeInput");

let translator;

function log(text) {
  outputDiv.textContent += text + "\n";
}

// Load model silently
async function loadModel() {
  statusDiv.textContent = "Initializing...";

  translator = await pipeline(
    "text-generation",
    "Xenova/distilgpt2"
  );

  statusDiv.textContent = "Ready";
}

// Convert input → JavaScript
async function translate(code) {
  const prompt = `
Convert the following code into JavaScript.

Rules:
- Output ONLY JavaScript
- No explanations

Code:
${code}
`;

  const result = await translator(prompt, {
    max_new_tokens: 150
  });

  return result[0].generated_text;
}

// Run compiler
window.runCode = async function () {
  outputDiv.textContent = "";

  const code = inputBox.value;

  if (!translator) {
    log("Not ready yet...");
    return;
  }

  statusDiv.textContent = "Running...";

  const jsCode = await translate(code);

  try {
    const originalLog = console.log;

    console.log = (...args) => {
      log(args.join(" "));
    };

    eval(jsCode);

    console.log = originalLog;
    statusDiv.textContent = "Done";
  } catch (err) {
    log("Error: " + err);
    statusDiv.textContent = "Error";
  }
};

loadModel();
</script>

</body>
</html>
