<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Compiler</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #111;
    color: #eee;
    padding: 20px;
  }

  textarea, input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: #222;
    color: #0f0;
    border: 1px solid #444;
    font-family: monospace;
  }

  button {
    padding: 10px 15px;
    margin-top: 10px;
    cursor: pointer;
  }

  #output {
    margin-top: 20px;
    background: #000;
    padding: 10px;
    height: 200px;
    overflow-y: auto;
    border: 1px solid #444;
    white-space: pre-wrap;
    font-family: monospace;
  }

  #status {
    margin-top: 10px;
    color: #aaa;
  }
</style>
</head>

<body>

<h2>Compiler</h2>

<input id="apiKey" placeholder="Enter your API key">
<br>
<button onclick="saveKey()">Save Key</button>

<textarea id="codeInput" placeholder="Enter code..."></textarea>
<br>
<button onclick="runCode()">Run</button>

<div id="status">Ready</div>
<div id="output"></div>

<script>
const API_URL = "https://www.aichixia.xyz/api/v1/chat/completions";

const outputDiv = document.getElementById("output");
const statusDiv = document.getElementById("status");
const inputBox = document.getElementById("codeInput");
const apiKeyInput = document.getElementById("apiKey");

function log(text) {
  outputDiv.textContent += text + "\n";
}

// Load saved key
window.onload = () => {
  const saved = localStorage.getItem("apiKey");
  if (saved) apiKeyInput.value = saved;
};

function saveKey() {
  localStorage.setItem("apiKey", apiKeyInput.value);
  alert("API key saved locally");
}

async function translate(code) {
  const API_KEY = localStorage.getItem("apiKey");

  if (!API_KEY) {
    throw new Error("No API key provided");
  }

  const prompt = `
Convert this into JavaScript ONLY.

Rules:
- Output only valid JavaScript
- No explanations
- No markdown
- No extra text

Input:
${code}
`;

  const res = await fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${API_KEY}`
    },
    body: JSON.stringify({
      model: "gpt-5-mini",
      messages: [
        { role: "user", content: prompt }
      ]
    })
  });

  const data = await res.json();

  return data.choices?.[0]?.message?.content || "";
}

// Clean output
function extractJS(text) {
  text = text.replace(/```[a-z]*|```/gi, "");
  const start = text.search(/(let|const|var|function|console\.log)/);
  if (start !== -1) text = text.slice(start);
  return text.trim();
}

window.runCode = async function () {
  outputDiv.textContent = "";

  try {
    statusDiv.textContent = "Translating...";

    const code = inputBox.value;
    let jsCode = await translate(code);
    jsCode = extractJS(jsCode);

    log("Generated JS:\n" + jsCode + "\n");
    log("Running...\n");

    const originalLog = console.log;
    console.log = (...args) => log(args.join(" "));

    eval(jsCode);

    console.log = originalLog;

    statusDiv.textContent = "Done";
  } catch (err) {
    log("Error: " + err.message);
    statusDiv.textContent = "Error";
  }
};
</script>

</body>
</html>
