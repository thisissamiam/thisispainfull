<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LineScript IDE</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      margin: 0;
    }
    header {
      background: #222;
      color: white;
      padding: 10px;
      text-align: center;
    }
    .container {
      display: flex;
      flex: 1;
    }
    textarea {
      width: 50%;
      height: 100%;
      padding: 10px;
      font-family: monospace;
      font-size: 14px;
      border: none;
      outline: none;
      resize: none;
    }
    .output {
      width: 50%;
      padding: 10px;
      background: #111;
      color: #0f0;
      font-family: monospace;
      overflow-y: auto;
      white-space: pre-wrap;
    }
    button {
      padding: 10px;
      margin: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header>
    <h1>LineScript IDE</h1>
    <button onclick="runCode()">Run</button>
    <button onclick="clearOutput()">Clear Output</button>
  </header>

  <div class="container">
    <textarea id="code" placeholder="Write your LineScript code here...\nExample:\naddline Hello\nset x 10\nadd x 5"></textarea>
    <div class="output" id="output"></div>
  </div>

  <script>
    const lines = [];
    const vars = {};

    function log(msg) {
      const output = document.getElementById("output");
      output.textContent += msg + "\n";
    }

    function runLine(line) {
      const parts = line.trim().split(" ");
      if (parts.length === 0) return;

      const cmd = parts[0];

      try {
        if (cmd === "addline") {
          lines.push(parts.slice(1).join(" "));
        } else if (cmd === "editline") {
          const i = parseInt(parts[1]);
          lines[i] = parts.slice(2).join(" ");
        } else if (cmd === "delline") {
          const i = parseInt(parts[1]);
          lines.splice(i, 1);
        } else if (cmd === "clearlines") {
          lines.length = 0;
        } else if (cmd === "set") {
          vars[parts[1]] = parseFloat(parts[2]);
        } else if (cmd === "add") {
          vars[parts[1]] += parseFloat(parts[2]);
        } else if (cmd === "sub") {
          vars[parts[1]] -= parseFloat(parts[2]);
        } else if (cmd === "multi") {
          vars[parts[1]] *= parseFloat(parts[2]);
        } else if (cmd === "div") {
          vars[parts[1]] /= parseFloat(parts[2]);
        } else if (cmd === "print") {
          log(vars[parts[1]]);
        }
      } catch (e) {
        log("Error on line: " + line);
      }
    }

    function runCode() {
      document.getElementById("output").textContent = "";
      lines.length = 0;

      const code = document.getElementById("code").value;
      const program = code.split("\n");

      program.forEach(line => {
        runLine(line);
      });

      log("\n--- FINAL STATE ---");
      log("Lines:");
      lines.forEach((l, i) => log(i + ": " + l));
      log("\nVariables:");
      for (let v in vars) {
        log(v + " = " + vars[v]);
      }
    }

    function clearOutput() {
      document.getElementById("output").textContent = "";
    }
  </script>
</body>
</html>
