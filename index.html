<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title><<<>><><<<>>> IDE</title>

<style>
body{
  margin:0;
  background:#0f0f0f;
  color:#e0e0e0;
  font-family:monospace;
}

#topbar{
  height:40px;
  background:#111;
  display:flex;
  align-items:center;
  padding:0 10px;
  gap:10px;
}

button{
  background:#222;
  color:#eee;
  border:none;
  padding:6px 10px;
  cursor:pointer;
}
button:hover{background:#333;}

#layout{
  display:flex;
  height:calc(100vh - 40px);
}

#editor{
  width:50%;
  height:100%;
  background:#0a0a0a;
  color:#00ffcc;
  border:none;
  outline:none;
  padding:10px;
  resize:none;
  font-size:14px;
}

#output{
  width:50%;
  height:100%;
  border:none;
  background:#ffffff;
}

#error{
  position:absolute;
  bottom:20px;
  left:10px;
  color:#ff5555;
  font-size:12px;
}

#status{
  position:absolute;
  bottom:5px;
  left:10px;
  font-size:10px;
  opacity:0.5;
}

/* Syntax highlighting overlay */
.editor-wrapper{
  position:relative;
  width:50%;
}

.highlight{
  position:absolute;
  top:0;
  left:0;
  right:0;
  bottom:0;
  padding:10px;
  white-space:pre-wrap;
  pointer-events:none;
  z-index:1;
  color:#ddd;
}

textarea{
  position:absolute;
  top:0;
  left:0;
  right:0;
  bottom:0;
  width:100%;
  height:100%;
  background:transparent;
  color:transparent;
  caret-color:white;
  border:none;
  outline:none;
  padding:10px;
  resize:none;
  z-index:2;
}

.keyword{ color:#4fc1ff; }
.arrow{ color:#c586c0; }
.number{ color:#b5cea8; }
.error-line{ background:rgba(255,0,0,0.25); }
</style>
</head>

<body>

<div id="topbar">
<button onclick="runCode()">><>< Run</button>
<button onclick="clearAll()"><< Clear</button>
</div>

<div id="layout">
  <div class="editor-wrapper">
    <pre id="highlight" class="highlight"></pre>
    <textarea id="editor" spellcheck="false">>-= >>>... >-></textarea>
  </div>
  <iframe id="output"></iframe>
</div>

<div id="error"></div>
<div id="status"><<<>>< status: ready ></div>

<script>
let vars = new Array(100).fill("");

function decodeToken(token){
  let count = (token.match(/>/g) || []).length;
  let dots = (token.match(/\./g) || []).length;

  if(dots === 1) return String.fromCharCode(((count - 1) % 26) + 97);
  if(dots === 2) return String.fromCharCode(((count - 1) % 26) + 65);
  if(dots === 3) return count === 0 ? ' ' : (count % 10).toString();
  return null;
}

function tokenize(code){
  let tokens = [];
  let current = "";

  for(let char of code){
    if(char === ' ' || char === '\n'){
      if(current) tokens.push(current);
      current = "";
    } else if(char === '[' || char === ']'){
      if(current) tokens.push(current);
      tokens.push(char);
      current = "";
    } else {
      current += char;
    }
  }
  if(current) tokens.push(current);
  return tokens;
}

function runCode(){
  document.getElementById('error').innerText = "";
  vars.fill("");

  const code = document.getElementById('editor').value;
  const tokens = tokenize(code);

  let output = "";

  function error(msg, token){
    document.getElementById('error').innerText = "Error: " + msg + " near '" + token + "'";
    throw new Error(msg);
  }

  function execute(start, end){
    for(let i = start; i < end; i++){
      let token = tokens[i];

      // ASSIGN
      if(/^(>+)-=$/.test(token)){
        let v = token.match(/>/g).length;
        let valueToken = tokens[i+1];
        if(!valueToken) error("Missing value after assignment", token);

        let val = decodeToken(valueToken);
        if(val === null) error("Invalid value token", valueToken);

        vars[v] = val;
        i++;
        continue;
      }

      // PRINT VAR
      if(/^(>+)->$/.test(token)){
        let v = token.match(/>/g).length;
        output += vars[v] || "";
        continue;
      }

      // LOOP
      if(/^(>+)$/.test(token) && tokens[i+1] === '['){
        let count = token.length;

        let depth = 1;
        let j = i + 2;
        while(j < tokens.length && depth > 0){
          if(tokens[j] === '[') depth++;
          if(tokens[j] === ']') depth--;
          j++;
        }

        if(depth !== 0) error("Unclosed loop", token);

        let loopStart = i + 2;
        let loopEnd = j - 1;

        for(let r = 0; r < count; r++){
          execute(loopStart, loopEnd);
        }

        i = loopEnd;
        continue;
      }

      // DIRECT OUTPUT
      if(/^[>.]+$/.test(token)){
        let val = decodeToken(token);
        if(val === null) error("Invalid output token", token);
        output += val;
        continue;
      }

      error("Unknown token", token);
    }
  }

  try{
    execute(0, tokens.length);
    document.getElementById('output').srcdoc = "<pre>" + output + "</pre>";
    document.getElementById('status').innerText = '<<<> executed >>';
  } catch(e){}
}

function highlightCode(code){
  return code.split("\n").map(line => {
    let html = line;
    html = html.replace(/(>-=|>->|>>>)\.?\.?\.?/g, '<span class="keyword">$&</span>');
    html = html.replace(/(\[|\])/g, '<span class="arrow">$&</span>');
    return `<div>${html}</div>`;
  }).join("\n");
}

function updateHighlight(){
  const code = document.getElementById('editor').value;
  document.getElementById('highlight').innerHTML = highlightCode(code);
}

function clearAll(){
  document.getElementById('editor').value = '';
  document.getElementById('output').srcdoc = '';
  document.getElementById('error').innerText = '';
  document.getElementById('status').innerText = '<< cleared >>';
}

const editor = document.getElementById('editor');
editor.addEventListener("input", () => {
  updateHighlight();
  runCode();
});

// init
updateHighlight();
runCode();
</script>

</body>
</html>
