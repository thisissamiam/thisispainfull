<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Custom Language IDE</title>
  <style>
    body {
      margin: 0;
      font-family: monospace;
      background: #1e1e1e;
      color: #ccc;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #topbar {
      height: 40px;
      background: #2d2d2d;
      display: flex;
      align-items: center;
      padding: 0 10px;
      gap: 10px;
      border-bottom: 1px solid #000;
    }

    button {
      background: #3a3a3a;
      border: none;
      color: white;
      padding: 5px 10px;
      cursor: pointer;
      border-radius: 4px;
    }

    button:hover {
      background: #505050;
    }

    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    #editor {
      width: 65%;
      height: 100%;
      border-right: 1px solid #000;
    }

    #rightPanel {
      width: 35%;
      display: flex;
      flex-direction: column;
      background: #1b1b1b;
    }

    #outputHeader {
      padding: 8px;
      background: #2d2d2d;
      border-bottom: 1px solid #000;
      font-size: 13px;
      color: #aaa;
    }

    #output {
      flex: 1;
      padding: 10px;
      color: #00ff88;
      overflow: auto;
      white-space: pre-wrap;
    }

    #statusBar {
      height: 22px;
      background: #007acc;
      color: white;
      display: flex;
      align-items: center;
      padding: 0 10px;
      font-size: 12px;
    }
  </style>
</head>
<body>

<div id="topbar">
  <button onclick="runCode()">▶ Run</button>
</div>

<div id="main">
  <div id="editor"></div>

  <div id="rightPanel">
    <div id="outputHeader">Output</div>
    <div id="output"></div>
  </div>
</div>

<div id="statusBar">Ready</div>

<script src="https://unpkg.com/monaco-editor@0.44.0/min/vs/loader.js"></script>
<script>
let editor;

require.config({ paths: { vs: 'https://unpkg.com/monaco-editor@0.44.0/min/vs' } });
require(['vs/editor/editor.main'], function () {
  editor = monaco.editor.create(document.getElementById('editor'), {
    value: ">>>[>.]",
    language: 'plaintext',
    theme: 'vs-dark',
    automaticLayout: true,
    minimap: { enabled: false }
  });
});

// ===== CORE ENGINE (UNCHANGED) =====
function tokenize(input) {
  let tokens = [];
  let i = 0;

  while (i < input.length) {
    if (input[i] === '>') {
      let start = i;
      while (i < input.length && input[i] === '>') i++;

      let rest = '';
      while (i < input.length && input[i] !== ' ' && input[i] !== '\n') {
        if (input[i] === '[' || input[i] === ']') break;
        rest += input[i++];
      }

      tokens.push(input.slice(start, i));
    } else if (input[i] === '[') {
      let start = i;
      let depth = 1;
      i++;
      while (i < input.length && depth > 0) {
        if (input[i] === '[') depth++;
        if (input[i] === ']') depth--;
        i++;
      }
      tokens.push(input.slice(start, i));
    } else {
      i++;
    }
  }

  return tokens;
}

function countArrows(str) {
  let i = 0;
  while (i < str.length && str[i] === '>') i++;
  return i;
}

function parseBlock(block) {
  let tokens = tokenize(block);
  return tokens.map(parseStatement);
}

function parseStatement(token) {
  if (token.includes('[')) {
    let arrows = countArrows(token);
    let inner = token.slice(token.indexOf('[') + 1, token.lastIndexOf(']'));
    return {
      type: 'loop',
      count: arrows,
      body: parseBlock(inner)
    };
  }

  if (token.includes('-=>')) {
    let [left, right] = token.split('-=>');
    return {
      type: 'assign',
      varIndex: countArrows(left),
      valueToken: right
    };
  }

  if (token.includes('->')) {
    return {
      type: 'varPrint',
      varIndex: countArrows(token.split('->')[0])
    };
  }

  if (token.startsWith('>')) {
    return {
      type: 'print',
      arrows: countArrows(token),
      dots: token.slice(countArrows(token))
    };
  }

  return { type: 'noop' };
}

function execute(ast, variables, out) {

  function parseValue(token) {
    let arrows = countArrows(token);
    let dots = token.slice(arrows);
    if (dots === '...') return arrows;
    return dots.length || 0;
  }

  for (let node of ast) {

    if (node.type === 'print') {
      let { dots, arrows } = node;

      if (dots === '.') out.value += 'a';
      else if (dots === '..') out.value += 'A';
      else if (dots === '...') out.value += String(arrows);
      else if (dots === '....') out.value += '@';
      else out.value += '?';
    }

    else if (node.type === 'assign') {
      variables[node.varIndex] = parseValue(node.valueToken);
    }

    else if (node.type === 'varPrint') {
      out.value += (variables[node.varIndex] || 0);
    }

    else if (node.type === 'loop') {
      for (let i = 0; i < node.count; i++) {
        execute(node.body, variables, out);
      }
    }
  }
}

function runCode() {
  const input = editor.getValue();
  let ast = parseBlock(input);

  let variables = {};
  let out = { value: '' };

  execute(ast, variables, out);

  document.getElementById('output').textContent = out.value;
  document.getElementById('statusBar').textContent = 'Ran successfully';
}
</script>

</body>
</html>
